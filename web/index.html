<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>SAMURAI Online Monitor</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <div style="display: flex;">
      <div id="sidebar">

	<div id="status-bar" style="padding: 10px;">
	  <button id="runBtn" style="width: 150px; padding: 5px 15px; border: none; cursor: pointer;">---</button>
	  Status:<br>
	  <span id="status-info">----</span><BR>
	  <span id="auto-reset-info">----</span><BR>
	  <span id="server-date-time">date-time</span><BR>
	  <span id="page-info" style="flex: 1;">(Page -/-)</span>

	  <div id="process-warning" style="display: none; color: #d9534f; ; padding: 10px;">
	    Please check smonlinemonitor process
	  </div>
	  
	  <div id="data-warning" style="display: none; color: #d9534f; ; padding: 10px;">
	    No data accumulation, check Beam/DAQ
	  </div>
	</div>
	
	<div class="hist-controls">
	  Histograms
          <ul id="hist-list" style="list-style: none;"></ul>

	  <button id="resetBtn" style="flex: 1; width: 150px; padding: 5px 15px; border: none; cursor: pointer;">
            Reset histograms
	  </button>
	</div>

	<div class="controls">
	    <div style="flex: 1;">
              Page: <input type="number" id="inputPage" value="1" min="1" style="width: 50px;">
	    </div>
	    <div style="flex: 1;">
              Rows: <input type="number" id="inputRows" value="3" min="1" max="5" style="width: 40px;">
	    </div>
	    <div style="flex: 1;">
              Cols: <input type="number" id="inputCols" value="3" min="1" max="8" style="width: 40px;">
	    </div>
	    <div style="flex: 1;">
              Interval (sec): <input type="number" id="inputInterval" value="8" min="5" max="60" style="width: 40px;">
	    </div>

	    <button id="drawBtn" style="width: 150px; padding: 5px 15px; border: none; cursor: pointer;">Draw</button>	    
	</div>

	
      </div>

      <div id="main-content">
        <div id="grid-container"></div>
      </div>

      <script src="script.js" type="module"></script>

  </body>
</html>
