<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>SAMURAI Online Monitor</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <div style="display: flex;">
      <div id="sidebar">
        <h3 style="padding: 5px;">Histogram List</h3>
        <ul id="hist-list" style="list-style: none;"></ul>
      </div>

      <div id="main-content">

	<div class="controls">
	  <button id="drawBtn">Update manually</button>
	  <label><input type="checkbox" id="autoUpdate" checked> Auto Update</label>

	  <div>
            Rows: <input type="number" id="inputRows" value="3" min="1" max="5" style="width: 40px;">
            Cols: <input type="number" id="inputCols" value="3" min="1" max="8" style="width: 40px;">
	  </div>
	  <span id="page-info" style="margin-left: 15px; font-family: monospace;"></span>
	</div>

        <div id="grid-container"></div>

      </div>

      <script src="script.js" type="module"></script>

  </body>
</html>
